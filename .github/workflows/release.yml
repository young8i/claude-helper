name: Build and Publish Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  RELEASES_REPO: young8i/claude-releases

jobs:
  build-publish:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: aarch64
            target: aarch64-apple-darwin
          - os: macos-13
            platform: darwin
            arch: x86_64
            target: x86_64-apple-darwin
          - os: windows-latest
            platform: windows
            arch: x86_64
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache npm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: src-tauri/target/release/bundle/

  publish-release:
    needs: build-publish
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bundles

      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "Claude 中文助手 ${{ github.ref_name }}"
          body: "Claude 中文助手 ${{ github.ref_name }}，汉化包同步更新。"
          files: |
            bundles/**/*.app.tar.gz
            bundles/**/*.msi
          draft: false
          prerelease: false
