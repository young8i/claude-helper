name: Build and Publish Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Debug signing key
        shell: bash
        run: |
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is set"
          else
            echo "❌ TAURI_SIGNING_PRIVATE_KEY is EMPTY"
          fi

      - name: Build
        uses: tauri-apps/tauri-action@v0
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: young8i/claude-releases
          token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "Claude 中文助手 ${{ github.ref_name }}"
          body: "Claude 中文助手 ${{ github.ref_name }}，汉化包同步更新。"
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.xz
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          draft: false
          prerelease: false
