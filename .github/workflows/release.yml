name: Build and Publish Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Verify updater signing key
        shell: bash
        run: |
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is set"
          else
            echo "❌ TAURI_SIGNING_PRIVATE_KEY is EMPTY; updater artifacts cannot be signed."
            exit 1
          fi

      - name: Build
        uses: tauri-apps/tauri-action@v0
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: young8i/claude-releases
          token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "Claude 中文助手 ${{ github.ref_name }}"
          body: "Claude 中文助手 ${{ github.ref_name }}，汉化包同步更新。"
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.xz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.sig
          draft: false
          prerelease: false

  publish-updater-manifest:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          RELEASE_REPO: young8i/claude-releases
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const token = process.env.GH_TOKEN;
          const repo = process.env.RELEASE_REPO;
          const tag = process.env.RELEASE_TAG;
          const version = tag.replace(/^v/, "");

          if (!token) {
            throw new Error("PUBLIC_RELEASES_TOKEN is missing");
          }

          const headers = {
            Accept: "application/vnd.github+json",
            Authorization: `Bearer ${token}`,
            "User-Agent": "claude-zh-helper-release",
            "X-GitHub-Api-Version": "2022-11-28",
          };

          async function githubJson(url) {
            const response = await fetch(url, { headers });
            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}: ${await response.text()}`);
            }
            return response.json();
          }

          async function downloadText(url) {
            const response = await fetch(url, { headers });
            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}: ${await response.text()}`);
            }
            return (await response.text()).trim();
          }

          function updaterPriority(name) {
            const lower = name.toLowerCase();
            if (lower.endsWith(".app.tar.gz")) return 10;
            if (lower.endsWith(".msi.zip") || lower.endsWith(".nsis.zip")) return 10;
            if (lower.endsWith(".msi") || lower.endsWith(".exe")) return 20;
            return 100;
          }

          function assetUrl(name) {
            return `https://github.com/${repo}/releases/download/${tag}/${encodeURIComponent(name)}`;
          }

          function setPlatform(platforms, key, artifactName, signature) {
            const current = platforms[key];
            if (current && updaterPriority(current.name) <= updaterPriority(artifactName)) {
              return;
            }
            platforms[key] = {
              name: artifactName,
              signature,
              url: assetUrl(artifactName),
            };
          }

          function addArtifact(platforms, artifactName, signature) {
            const lower = artifactName.toLowerCase();
            if (lower.endsWith(".app.tar.gz")) {
              if (lower.includes("aarch64") || lower.includes("arm64")) {
                setPlatform(platforms, "darwin-aarch64", artifactName, signature);
              } else if (lower.includes("x86_64") || lower.includes("x64")) {
                setPlatform(platforms, "darwin-x86_64", artifactName, signature);
              } else {
                setPlatform(platforms, "darwin-aarch64", artifactName, signature);
                setPlatform(platforms, "darwin-x86_64", artifactName, signature);
              }
              return;
            }

            if (
              lower.endsWith(".msi.zip") ||
              lower.endsWith(".nsis.zip") ||
              lower.endsWith(".msi") ||
              lower.endsWith(".exe")
            ) {
              const platform = lower.includes("aarch64") || lower.includes("arm64")
                ? "windows-aarch64"
                : "windows-x86_64";
              setPlatform(platforms, platform, artifactName, signature);
            }
          }

          const release = await githubJson(`https://api.github.com/repos/${repo}/releases/tags/${tag}`);
          const assetsByName = new Map(release.assets.map((asset) => [asset.name, asset]));
          const platforms = {};

          for (const asset of release.assets) {
            if (!asset.name.endsWith(".sig")) continue;
            const artifactName = asset.name.slice(0, -4);
            if (!assetsByName.has(artifactName)) continue;
            const signature = await downloadText(asset.browser_download_url);
            if (!signature) continue;
            addArtifact(platforms, artifactName, signature);
          }

          for (const entry of Object.values(platforms)) {
            delete entry.name;
          }

          if (Object.keys(platforms).length === 0) {
            throw new Error("No updater signature/artifact pairs found. Check createUpdaterArtifacts and uploaded *.sig files.");
          }

          const latest = {
            version,
            notes: `Claude 中文助手 v${version}`,
            pub_date: new Date().toISOString(),
            platforms,
          };

          fs.writeFileSync("latest.json", `${JSON.stringify(latest, null, 2)}\n`);
          console.log(JSON.stringify(latest, null, 2));
          NODE

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          RELEASE_REPO: young8i/claude-releases
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release upload "$RELEASE_TAG" latest.json --repo "$RELEASE_REPO" --clobber
