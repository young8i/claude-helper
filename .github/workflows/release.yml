name: Build and Publish Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  RELEASES_REPO: young8i/claude-releases

jobs:
  build-publish:
    strategy:
      matrix:
        include:
          # Apple Silicon Mac
          - os: macos-latest
            platform: darwin
            arch: aarch64
          # Intel Mac
          - os: macos-13
            platform: darwin
            arch: x86_64
          # Windows
          - os: windows-latest
            platform: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: src-tauri/target/release/bundle/

  publish-release:
    needs: build-publish
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bundles

      - name: Build manifest and publish
        run: |
          VERSION="${{ github.ref_name }}"
          PUBDATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json << JSONEOF
          {
            "version": "${VERSION}",
            "notes": "Claude 中文助手 ${VERSION}。汉化包已同步至最新。",
            "pub_date": "${PUBDATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/${{ env.RELEASES_REPO }}/releases/download/${VERSION}/Claude中文助手_aarch64.app.tar.gz",
                "signature": ""
              },
              "darwin-x86_64": {
                "url": "https://github.com/${{ env.RELEASES_REPO }}/releases/download/${VERSION}/Claude中文助手_x64.app.tar.gz",
                "signature": ""
              },
              "windows-x86_64": {
                "url": "https://github.com/${{ env.RELEASES_REPO }}/releases/download/${VERSION}/Claude中文助手_x64.msi",
                "signature": ""
              }
            }
          }
          JSONEOF

      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "Claude 中文助手 ${{ github.ref_name }}"
          body: "Claude 中文助手 ${{ github.ref_name }}，汉化包同步更新。"
          files: |
            bundles/**/*.app.tar.gz
            bundles/**/*.msi
            latest.json
          draft: false
          prerelease: false